name: healthcheck

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        run: |
          http_status=$(curl -so /dev/null -w '%{http_code}' https://statementsensei.streamlit.app/healthz)
          if [ "$http_status" != "200" ]; then
            echo "::error::Health check failed with status $http_status"
            exit 1
          fi
          echo "Health check passed (HTTP $http_status)"

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1

      - name: Check app loads successfully
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            try {
              await page.goto('https://statementsensei.streamlit.app/', {
                waitUntil: 'networkidle',
                timeout: 60000,
              });
              const errorText = await page.locator('text=Error running app').count();
              if (errorText > 0) {
                console.error('::error::App is returning an error page');
                process.exit(1);
              }
              console.log('App loads successfully');
            } catch (err) {
              console.error('::error::App failed to load: ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "
