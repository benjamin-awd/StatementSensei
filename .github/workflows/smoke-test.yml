name: smoke-test

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: docs/example_statement.pdf
          sparse-checkout-cone-mode: false

      - name: Check health endpoint
        run: |
          http_status=$(curl -so /dev/null -w '%{http_code}' https://statementsensei.streamlit.app/healthz)
          if [ "$http_status" != "200" ]; then
            echo "::error::Health check failed with status $http_status"
            exit 1
          fi
          echo "Health check passed (HTTP $http_status)"

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1

      - name: Check app loads and processes a statement
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            try {
              await page.goto('https://statementsensei.streamlit.app/', { timeout: 60000 });

              // Check for error page
              await page.waitForTimeout(5000);
              const bodyText = await page.locator('body').innerText();
              if (bodyText.includes('Error')) {
                console.error('::error::' + bodyText.trim());
                process.exit(1);
              }
              console.log('App loads successfully');

              // Streamlit Cloud wraps the app in an iframe
              const iframe = page.frameLocator('iframe').first();

              // Upload the example statement
              const fileInput = iframe.locator('[data-testid=\"stFileUploader\"] input[type=\"file\"]');
              await fileInput.waitFor({ state: 'attached', timeout: 60000 });
              await fileInput.setInputFiles('docs/example_statement.pdf');
              console.log('Uploaded example statement');

              // Wait for a dataframe/table to appear (indicates successful processing)
              await iframe.locator('[data-testid=\"stDataFrame\"], table').first().waitFor({
                state: 'visible',
                timeout: 60000,
              });
              console.log('Statement processed successfully');
            } catch (err) {
              console.error('::error::' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "
